name: Deploy Foreign Exchange Checker to Portfolio

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        run: |
          cd app
          pnpm install
        env:
          CI: true

      - name: Build app
        run: |
          cd app
          pnpm run build

      - name: Deploy to Main Portfolio Repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PORTFOLIO_DEPLOY_TOKEN }}
          external_repository: MaelkMark/maelkmark.github.io
          publish_branch: master
          publish_dir: ./app/dist
          destination_dir: frontendmentor/foreign-exchange-checker