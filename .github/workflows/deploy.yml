name: Deploy to Portfolio Main Repo

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install Dependencies
        working-directory: ./app
        run: pnpm install

      - name: Build App
        working-directory: ./app
        run: pnpm run build

      - name: Deploy to Main Portfolio Repo
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.PORTFOLIO_DEPLOY_TOKEN }}
          repository-name: MaelkMark/maelkmark.github.io # The repository to deploy to
          branch: main # The branch maelkmark.github.io uses for GitHub Pages
          folder: app/dist # Build output
          target-folder: frontendmentor/exchange-checker
          clean: true